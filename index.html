<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>무한의 계단 - 쿼카의 모험</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="game-frame">
            <div id="score-display">Score: <span id="score">0</span></div>

            <div id="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
            </div>

            <div id="touch-controls">
                <button type="button" id="btn-left" aria-label="왼쪽">⬅️</button>
                <button type="button" id="btn-right" aria-label="오른쪽">➡️</button>
            </div>

            <div id="start-screen">
                <h1>무한의 계단</h1>
                <p>쿼카의 모험</p>
                <p class="instructions">← → 키 또는 아래 버튼으로 방향을 선택하세요!</p>
                <button id="start-btn">시작하기</button>
            </div>

            <div id="gameover-screen" class="hidden">
                <h1>GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Restart</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
